<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recursos Multimídia — Cap. 4 / Ativ. 4</title>
</head>
<body>

  <header>
    <h1>Recursos Multimídia — Programação Web</h1>
  </header>

  <main>

    <!-- VÍDEO -->
    <section>
      <h2>Vídeo</h2>
      <figure>
        <video controls width="800" height="450" poster="poster.jpg">
          <source src="video.mp4" type="video/mp4">
          <source src="video.webm" type="video/webm">
          <p>Seu navegador não suporta vídeo.</p>
        </video>
        <figcaption>Exemplo de vídeo</figcaption>
      </figure>
    </section>

    <!-- ÁUDIO -->
    <section>
      <h2>Áudio</h2>
      <figure>
        <audio controls>
          <source src="audio.mp3" type="audio/mpeg">
          <source src="audio.ogg" type="audio/ogg">
          <p>Seu navegador não suporta áudio.</p>
        </audio>
        <figcaption>Exemplo de áudio</figcaption>
      </figure>
    </section>

    <!-- YOUTUBE -->
    <section>
      <h2>Vídeo do YouTube</h2>
      <figure>
        <iframe width="800" height="450"
          src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ"
          title="Vídeo educativo"
          loading="lazy"
          allowfullscreen>
        </iframe>
        <figcaption>Vídeo externo</figcaption>
      </figure>
    </section>

    <!-- IMAGEM -->
    <section>
      <h2>Imagem</h2>
      <figure>
        <picture>
          <source media="(min-width: 768px)" srcset="imagem-grande.jpg">
          <img src="imagem-pequena.jpg" alt="Imagem exemplo" width="400">
        </picture>
        <figcaption>Imagem responsiva</figcaption>
      </figure>
    </section>

  </main>

  <footer>
    <p>
      Atividade 4 — Capítulo 4 |
      Arthur Matheus |
      2026
    </p>
    <p><a href="../index.html">← Voltar à página principal</a></p>
  </footer>

</body>
</html>
