<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula</title>
</head>
<body>

  <header>
    <h1>Formulário de Matrícula</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>

    <p>* Campos obrigatórios</p>

    <form action="https://httpbin.org/post" method="post">

      <!-- DADOS PESSOAIS -->
      <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome completo *</label><br>
        <input type="text" id="nome" name="nome" required minlength="5"><br><br>

        <label for="cpf">CPF *</label><br>
        <input type="text" id="cpf" name="cpf"
          placeholder="000.000.000-00"
          pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
          title="CPF no formato 000.000.000-00"
          required><br><br>

        <label for="telefone">Telefone</label><br>
        <input type="tel" id="telefone" name="telefone"
          placeholder="(82) 99999-9999"><br><br>

        <label for="email">E-mail *</label><br>
        <input type="email" id="email" name="email" required>

      </fieldset>

      <br>

      <!-- DADOS ACADÊMICOS -->
      <fieldset>
        <legend>Dados Acadêmicos</legend>

        <label for="curso">Curso *</label><br>
        <select id="curso" name="curso" required>
          <option value="">Selecione</option>

          <optgroup label="Computação">
            <option>Sistemas de Informação</option>
            <option>Ciência da Computação</option>
            <option>Engenharia da Computação</option>
          </optgroup>

          <optgroup label="Gestão">
            <option>Administração</option>
            <option>Ciências Contábeis</option>
          </optgroup>
        </select>

        <br><br>

        <fieldset>
          <legend>Período</legend>

          <input type="radio" name="periodo" value="manha"> Manhã<br>
          <input type="radio" name="periodo" value="tarde"> Tarde<br>
          <input type="radio" name="periodo" value="noite"> Noite
        </fieldset>

        <br>

        <label for="ano">Ano de ingresso *</label><br>
        <input type="number" id="ano" name="ano_ingresso"
          min="2025" max="2030" required>

      </fieldset>

      <br>

      <!-- INTERESSES -->
      <fieldset>
        <legend>Áreas de Interesse</legend>

        <input type="checkbox" name="interesses[]" value="web"> Desenvolvimento Web<br>
        <input type="checkbox" name="interesses[]" value="bd"> Banco de Dados<br>
        <input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial<br>
        <input type="checkbox" name="interesses[]" value="seguranca"> Segurança<br>
        <input type="checkbox" name="interesses[]" value="infra"> Infraestrutura

      </fieldset>

      <br>

      <button type="submit">Solicitar matrícula</button>
      <button type="reset">Limpar formulário</button>

    </form>

  </main>

</body>
</html>
