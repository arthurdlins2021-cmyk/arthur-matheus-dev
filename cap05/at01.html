<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT01 — Formulário de Contato</title>
</head>
<body>

  <header>
    <h1>Formulário de Contato</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>

    <form action="https://httpbin.org/get" method="get">

      <label for="nome">Nome completo:</label><br>
      <input type="text" id="nome" name="nome"><br><br>

      <label for="email">E-mail:</label><br>
      <input type="email" id="email" name="email"><br><br>

      <label for="assunto">Assunto:</label><br>
      <input type="text" id="assunto" name="assunto"><br><br>

      <label for="mensagem">Mensagem:</label><br>
      <textarea id="mensagem" name="mensagem" rows="5"></textarea><br><br>

      <button type="submit">Enviar mensagem</button>

    </form>

  </main>

</body>
</html>
