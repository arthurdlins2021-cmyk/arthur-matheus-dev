<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT05 — Pesquisa</title>
</head>
<body>

  <header>
    <h1>Pesquisa Acadêmica</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>

    <p>* Campos obrigatórios</p>

    <form action="https://httpbin.org/post" method="post" novalidate>

      <!-- PERFIL -->
      <fieldset>
        <legend>Perfil do estudante</legend>

        <label>Nome *</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Matrícula *</label><br>
        <input type="text" name="matricula" pattern="\d{7}" required><br><br>

        <label for="email">E-mail institucional *</label><br>
        <input type="email" id="email" name="email"
          onblur="validarEmail(this)">
        <p id="erro-email"></p>

        <br>

        <label>Período</label><br>
        <select name="periodo">
          <option>1º</option>
          <option>2º</option>
          <option>3º</option>
        </select>

      </fieldset>

      <br>

      <!-- TECNOLOGIA -->
      <fieldset>
        <legend>Perfil tecnológico</legend>

        <input type="checkbox" name="tech[]" value="html"> HTML<br>
        <input type="checkbox" name="tech[]" value="css"> CSS<br>
        <input type="checkbox" name="tech[]" value="js"> JavaScript<br>
        <input type="checkbox" name="tech[]" value="python"> Python<br>

      </fieldset>

      <br>

      <!-- AVALIAÇÃO -->
      <fieldset>
        <legend>Avaliação</legend>

        <label>Nota:</label><br>
        <input type="range" min="0" max="10"><br><br>

        <label>Sugestões:</label><br>
        <textarea rows="4"></textarea><br><br>

        <label>Data *</label><br>
        <input type="date" id="data" required>

      </fieldset>

      <br>

      <!-- FINAL -->
      <fieldset>
        <legend>Consentimento</legend>

        <input type="checkbox" required> Aceito os termos
        <input type="hidden" value="2026">
      </fieldset>

      <br>

      <button type="submit">Enviar</button>

    </form>

  </main>

  <script>
    function validarEmail(campo) {
      const erro = document.getElementById('erro-email');
      if (!campo.value.endsWith('@ifal.edu.br')) {
        erro.textContent = 'Use e-mail do IFAL';
      } else {
        erro.textContent = '';
      }
    }

    document.getElementById('data').max =
      new Date().toISOString().split('T')[0];
  </script>

</body>
</html>
