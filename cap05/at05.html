<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWEB1 — Cap. 05 — AT05 — Pesquisa Acadêmica</title>
</head>
<body>

  <header>
    <h1>Pesquisa de Perfil Acadêmico</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>
    <p>* Campos obrigatórios</p>

    <form action="https://httpbin.org/post" method="post" novalidate>

      <input type="hidden" name="pesquisa_id" value="PWEB1-2026-1" />

      <fieldset>
        <legend>Perfil do Estudante</legend>

        <label for="nome">* Nome completo:</label>
        <input type="text" id="nome" name="nome" autocomplete="name" required />

        <br><br>

        <label for="matricula">* Matrícula:</label>
        <input type="text" id="matricula" name="matricula"
          pattern="\d{7}"
          title="A matrícula deve ter 7 dígitos numéricos"
          required />

        <br><br>

        <label for="email">* E-mail institucional:</label>
        <input type="email" id="email" name="email"
          pattern="[a-zA-Z0-9._%+\-]+@ifal\.edu\.br"
          onblur="validarEmail(this)" />
        <p id="erro-email"></p>

        <br>

        <label for="periodo">* Período atual:</label>
        <select id="periodo" name="periodo" required>
          <option value="">Selecione</option>
          <option value="1">1º período</option>
          <option value="2">2º período</option>
          <option value="3">3º período</option>
          <option value="4">4º período</option>
          <option value="5">5º período</option>
          <option value="6">6º período</option>
          <option value="7">7º período</option>
          <option value="8">8º período</option>
        </select>

        <br><br>

        <fieldset>
          <legend>Turno</legend>
          <input type="radio" id="manha" name="turno" value="manha" />
          <label for="manha">Manhã</label><br>
          <input type="radio" id="tarde" name="turno" value="tarde" />
          <label for="tarde">Tarde</label><br>
          <input type="radio" id="noite" name="turno" value="noite" />
          <label for="noite">Noite</label>
        </fieldset>

      </fieldset>

      <br>

      <fieldset>
        <legend>Perfil Tecnológico</legend>

        <fieldset>
          <legend>Tecnologias que conhece:</legend>
          <input type="checkbox" name="tecnologias[]" value="html" /> HTML<br>
          <input type="checkbox" name="tecnologias[]" value="css" /> CSS<br>
          <input type="checkbox" name="tecnologias[]" value="js" /> JavaScript<br>
          <input type="checkbox" name="tecnologias[]" value="python" /> Python<br>
          <input type="checkbox" name="tecnologias[]" value="java" /> Java<br>
          <input type="checkbox" name="tecnologias[]" value="sql" /> SQL<br>
          <input type="checkbox" name="tecnologias[]" value="git" /> Git<br>
          <input type="checkbox" name="tecnologias[]" value="linux" /> Linux
        </fieldset>

        <br>

        <label for="linguagem">Linguagem favorita:</label>
        <select id="linguagem" name="linguagem">
          <option value="">Selecione</option>
          <option value="java">Java</option>
          <option value="python">Python</option>
          <option value="js">JavaScript</option>
        </select>

        <br><br>

        <label for="experiencia_anos">Anos de experiência:</label>
        <input type="number" id="experiencia_anos" name="experiencia_anos" min="0" max="30" />

        <br><br>

        <label for="portfolio">Portfólio:</label>
        <input type="url" id="portfolio" name="portfolio" placeholder="https://" />

      </fieldset>

      <br>

      <fieldset>
        <legend>Avaliação da Disciplina</legend>

        <!-- NOTA INICIANDO EM 0 -->
        <label for="nota">Nota para a disciplina: <span id="valor-nota">0</span>/10</label>
        <input type="range" id="nota" name="nota" min="0" max="10" value="0"
          oninput="document.getElementById('valor-nota').textContent = this.value" />

        <br><br>

        <label for="sugestoes">Sugestões:</label><br>
        <textarea id="sugestoes" name="sugestoes"></textarea>

        <br><br>

        <label for="data_preenchimento">Data:</label>
        <input type="date" id="data_preenchimento" name="data_preenchimento" required />

      </fieldset>

      <br>

      <fieldset>
        <legend>Envio</legend>

        <input type="checkbox" required />
        <label>Autorizo o uso dos dados</label>

        <br><br>

        <button type="submit">Enviar</button>

      </fieldset>

    </form>
  </main>

  <script>
    function validarEmail(campo) {
      const erro = document.getElementById('erro-email');
      if (!campo.value.endsWith('@ifal.edu.br')) {
        erro.textContent = 'Use e-mail institucional';
      } else {
        erro.textContent = '';
      }
    }

    document.getElementById('data_preenchimento').max =
      new Date().toISOString().split('T')[0];
  </script>

</body>
</html>
